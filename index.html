function ocrFlag(regId){
  const reg=findRegion(regId); if(!reg||!assertTenant(reg)) return;
  reg.correctionStatus='flagged'; reg.correctedBy=currentUser.name;
  recomputeDocOcr(reg.documentId);
  log.event('ocr:flag',{region:regId}); showToast('Flagged for expert review','info');
  renderView();
}
function recomputeDocOcr(docId){
  const doc=byId(documents,docId); if(!doc) return;
  const regs=ocrRegions.filter(r=>r.documentId===docId);
  const pend=regs.filter(r=>r.correctionStatus==='pending').length;
  doc.regionsFlagged=pend;
  if(pend===0 && doc.status==='needs-review') doc.status='ready-chunk';
}

/* ---- Bulk ingestion handlers (spec §20) ---- */
function setBulkRadio(name, val){
  const cfg=appState.bulkConfig; if(!cfg) return;
  if(name==='bulk-src') cfg.source=val;
  else if(name==='bulk-chunk') cfg.chunk=val;
  else if(name==='bulk-synth') cfg.synth=val;
  else if(name==='bulk-skip') cfg.skipAbove=+val;
  renderView();
}
function toggleBulkCheck(group, val){
  const cfg=appState.bulkConfig; if(!cfg) return;
  const key = group==='type'?'types' : group==='lang'?'langs' : group==='synthType'?'synthTypes' : null;
  if(!key){ renderView(); return; }
  const arr=cfg[key]; const i=arr.indexOf(val); if(i>=0) arr.splice(i,1); else arr.push(val);
  renderView();
}
function launchBulkJob(){
  if(!can('Datasets')){ showToast('You lack permission to start bulk jobs','error'); return; }
  const cfg=appState.bulkConfig||defaultBulkConfig();
  const id='bulk'+Date.now();
  const total=51240;
  const job={ id, tenantId:currentTenant.id, name:'New Corpus Ingestion', totalFiles:total, status:'in_progress',
    complete:0, processing:200, failed:0, duplicatesSkipped:1847, ocrRegionsFlagged:14832, ocrRegionsCorrected:0,
    workersActive:cfg.cpu+cfg.gpu, cpuWorkers:cfg.cpu, gpuWorkers:cfg.gpu, startedAt:'2026-07-10T09:00',
    estimatedCompletion:'~2.4 days remaining', computeCostSoFar:0, computeCostTotal:16000, locked:false, config:cfg };
  job.queued=total-job.duplicatesSkipped-job.failed-job.complete-job.processing;
  job.funnel=deriveFunnel(job); job.failures=sampleFailures(job); job.dedupClusters=sampleClusters(job); job.annotators=deriveAnnotators({id:'bulk1'});
  bulkJobs.unshift(job);
  log.event('bulk:launch',{id, config:cfg}); pushActivity('started bulk ingestion job ('+fmtNum(total)+' files)'); pushNotif('Bulk job started — '+fmtNum(total)+' files queued','grid');
  appState.bulkJobId=id; appState.bulkView='dashboard';
  showToast('Bulk ingestion job started','ok');
  renderView();
}
function exportFailureLog(id){
  const j=byId(getBulkJobs(),id); if(!j||!assertTenant(j)) return;
  const csv='doc_id,filename,stage,reason\n'+j.failures.map(f=>[f.id,f.file,f.stage,f.reason].join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=j.name.replace(/\s+/g,'_')+'_failures.csv'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  log.event('bulk:export-failures',{id}); showToast('Failure log exported','ok');
}

/* ---- Audio & video handlers (spec §21) ---- */
function audioCorrect(id, action){
  const sg=findSegment(id); if(!sg||!assertTenant(sg)) return;
  if(!can('Annotation')){ showToast('You lack annotation permission','error'); return; }
  if(action==='discard'){ sg.status='discarded'; }
  else { const ta=el('audio-text'); sg.correctedText = action==='accept' ? sg.cleanText : (ta?ta.value:sg.cleanText); sg.status='corrected'; }
  sg.correctedBy=currentUser.name;
  recomputeAudio(sg.audioId);
  log.event('audio:'+action,{seg:id});
  pushActivity((action==='discard'?'discarded':'corrected')+' an audio segment');
  showToast(action==='discard'?'Segment discarded':'Segment corrected','ok');
  renderView();
}
function videoCorrect(id, action){
  const fr=findFrame(id); if(!fr||!assertTenant(fr)) return;
  if(!can('Annotation')){ showToast('You lack annotation permission','error'); return; }
  if(action==='discard'){ fr.status='discarded'; }
  else { const ta=el('video-caption'); fr.correctedCaption = action==='accept' ? fr.caption : (ta?ta.value:fr.caption); fr.status='corrected';
    const q=el('video-q'), a=el('video-a'); if(q&&a&&a.value.trim()) fr.qaPairs.push({q:q.value, a:a.value}); }
  recomputeVideo(fr.videoId);
  log.event('video:'+action,{frame:id});
  pushActivity((action==='discard'?'discarded':'captioned')+' a video frame');
  showToast(action==='discard'?'Frame discarded':'Frame captioned','ok');
  renderView();
}
function recomputeAudio(audioId){ const f=byId(audioFiles,audioId); if(!f) return;
  const segs=audioSegments.filter(s=>s.audioId===audioId); const pend=segs.filter(s=>s.status==='pending').length;
  f.flagged=pend; if(pend===0 && f.status!=='ready') f.status='ready'; }
function recomputeVideo(videoId){ const f=byId(videoFiles,videoId); if(!f) return;
  const frs=videoFrames.filter(x=>x.videoId===videoId); const pend=frs.filter(x=>x.status==='pending').length;
  f.flagged=pend; if(pend===0 && f.status!=='ready') f.status='ready'; }
const MEDIA_FORMATS={ audio:['Whisper (ASR)','Mozilla DeepSpeech','Common Voice','Custom JSONL'], video:['VideoQA JSONL','Frame + Caption JSONL'] };
function uploadMediaModal(kind){
  if(!can('Datasets')){ showToast('You lack permission','error'); return; }
  const accept = kind==='audio'?'.mp3,.wav,.flac,.ogg,.m4a':'.mp4,.mov,.avi,.mkv';
  const est = kind==='audio'?'~4 min per hour of audio on GPU':'~12 min per hour of video';
  openModal('<div class="modal-head"><strong>Upload '+(kind==='audio'?'Audio':'Video')+'</strong><button class="icon-btn" data-action="close-modal">'+ICON.x+'</button></div>'
    +'<div class="modal-body"><div id="media-drop" style="border:2px dashed var(--border-active);border-radius:14px;padding:40px;text-align:center;cursor:pointer">'
    +(kind==='audio'?ICON.bolt:ICON.image)+'<div class="mt8">Drop '+kind+' files or click to browse</div><div class="muted mt4" style="font-size:12px">'+(kind==='audio'?'MP3 · WAV · FLAC · OGG · M4A':'MP4 · MOV · AVI · MKV')+'</div>'
    +'<div class="muted mt4" style="font-size:11px">Est. processing: '+est+'</div>'
    +'<input type="file" id="media-file" class="hidden" multiple accept="'+accept+'"></div><div id="media-progress" class="hidden mt16"></div></div>');
  const drop=el('media-drop'), file=el('media-file');
  drop.onclick=()=>file.click();
  drop.ondragover=e=>{ e.preventDefault(); drop.style.borderColor='var(--coral)'; };
  drop.ondragleave=()=>{ drop.style.borderColor='var(--border-active)'; };
  drop.ondrop=e=>{ e.preventDefault(); handleMediaUpload(kind, Array.from(e.dataTransfer.files||[])); };
  file.onchange=()=>{ handleMediaUpload(kind, Array.from(file.files||[])); };
}
function handleMediaUpload(kind, files){
  if(!files.length) return; const f=files[0];
  const steps = kind==='audio'
    ? ['Normalising format (16kHz WAV)…','Checking audio quality (SNR, clipping, silence)…','Detecting language / speaker count…','Transcribing (Whisper Indic)…','Scoring transcript confidence…','Segmenting into training clips…','Done']
    : ['Extracting audio track…','Transcribing audio (Whisper)…','Extracting keyframes…','Filtering frames (blur, dark, duplicates)…','Generating captions per frame…','Detecting on-screen text (OCR)…','Scoring visual quality…','Synthesising VideoQA pairs…','Done'];
  const prog=el('media-progress'); prog.classList.remove('hidden');
  let i=0; const tick=()=>{ if(!el('media-progress')) return; const done=i>=steps.length-1;
    prog.innerHTML='<div class="mono muted" style="font-size:11px;margin-bottom:6px">'+escapeHtml(f.name)+'</div><div class="flex gap8">'+(done?ICON.check:'<div class="pill pill-blue">'+(i+1)+'/'+steps.length+'</div>')+'<span>'+escapeHtml(steps[i])+'</span></div><div class="meter mt8"><div class="meter-fill" style="width:'+Math.round((i+1)/steps.length*100)+'%;background:var(--gradient-brand)"></div></div>';
    i++; if(i<steps.length){ setTimeout(tick,520); } else finalizeMediaUpload(kind, f); };
  tick();
}
function finalizeMediaUpload(kind, file){
  const seed=(file.name.length*61+kind.length)>>>0; const rand=mkRand(seed);
  if(kind==='audio'){ const segCount=30+Math.floor(rand()*40), flagged=Math.round(segCount*0.3);
    const s={ id:'aud'+Date.now(), tenantId:currentTenant.id, projectId:appState.projectId||getProjects()[0]?.id, name:file.name, durationSec:600+Math.floor(rand()*3000), language:'hi+en', segments:segCount, flagged, avgSnr:12+Math.floor(rand()*14), transcriptConf:60+Math.floor(rand()*30), speakerCount:1+Math.floor(rand()*3), status:'in_review', seed };
    buildAudioFile(s); appState.audioId=s.id;
    log.event('audio:upload',{id:s.id, segs:segCount}); pushActivity('uploaded audio '+file.name); pushNotif(segCount+' audio segments created from '+file.name,'bolt');
    showToast(segCount+' segments created, '+flagged+' flagged','ok');
  } else { const frCount=40+Math.floor(rand()*40), flagged=Math.round(frCount*0.25);
    const s={ id:'vid'+Date.now(), tenantId:currentTenant.id, projectId:appState.projectId||getProjects()[0]?.id, name:file.name, durationSec:600+Math.floor(rand()*2400), resolution:'1080p', language:'ta+en', frames:frCount, captioned:frCount, flagged, visualScore:55+Math.floor(rand()*35), status:'in_review', seed };
    buildVideoFile(s); appState.videoId=s.id;
    log.event('video:upload',{id:s.id, frames:frCount}); pushActivity('uploaded video '+file.name); pushNotif(frCount+' frames extracted from '+file.name,'image');
    showToast(frCount+' frames extracted, '+flagged+' flagged','ok');
  }
  closeModal(); setView('documents'); appState.docTab=kind;
}
function exportMedia(kind, id){
  const formats=MEDIA_FORMATS[kind];
  let opts=formats.map((fmt,i)=>'<button class="chip'+(i===0?' is-on':'')+'" data-action="toast" data-msg="Exported in '+escapeAttr(fmt)+' format (mock)">'+escapeHtml(fmt)+'</button>').join('');
  openModal('<div class="modal-head"><strong>Export '+(kind==='audio'?'Audio dataset':'Video dataset')+'</strong><button class="icon-btn" data-action="close-modal">'+ICON.x+'</button></div>'
    +'<div class="modal-body"><label class="field-label">Format</label><div class="flex wrap gap6">'+opts+'</div>'
    +'<p class="muted mt16" style="font-size:12px">Only corrected / accepted '+(kind==='audio'?'segments':'frames')+' are included in the export.</p></div>'
    +'<div class="modal-foot"><button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-primary" data-action="do-export-media" data-kind="'+kind+'" data-id="'+id+'">'+ICON.download+'Export</button></div>');
}
function doExportMedia(kind, id){
  let lines=[];
  if(kind==='audio'){ const segs=audioSegments.filter(s=>s.audioId===id && (s.status==='corrected'||s.status==='ok'));
    lines=segs.map(s=>JSON.stringify({ audio_id:s.id, transcript:s.correctedText||s.cleanText, language:s.script, duration:s.durationSec, speaker_id:'spk_01', confidence:+(s.confidence/100).toFixed(2) })); }
  else { const frs=videoFrames.filter(fr=>fr.videoId===id && (fr.status==='corrected'||fr.status==='ok'));
    lines=frs.map(fr=>JSON.stringify({ frame_id:fr.id, image_path:fr.id+'.jpg', caption:fr.correctedCaption||fr.caption, on_screen_text:fr.onScreenText, timestamp:fr.timestamp })); }
  const blob=new Blob([lines.join('\n')||''],{type:'application/jsonl'}); const url=URL.createObjectURL(blob);
  const file=byId(kind==='audio'?audioFiles:videoFiles,id);
  const a=document.createElement('a'); a.href=url; a.download=(file?file.name.replace(/\.[^.]+$/,''):kind)+'_'+kind+'.jsonl'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); closeModal();
  log.event(kind+':export',{id, rows:lines.length}); showToast('Exported '+lines.length+' '+(kind==='audio'?'segments':'frames'),'ok');
}

/* ---- Preference ranking handlers (spec §24) ---- */
function prefSave(id){
  const p=byId(prefPairs,id); if(!p||!assertTenant(p)) return;
  if(!can('Annotation')){ showToast('You lack annotation permission','error'); return; }
  if(!p.chosen){ showToast('Pick which response is better first','info'); return; }
  const r=el('pref-reason'); if(r) p.reasoning=r.value;
  p.status='done';
  log.event('pref:save',{id, chosen:p.chosen});
  pushActivity('ranked a preference pair ('+p.chosen+')');
  showToast('Preference saved','ok');
  renderView();
}
function download(name, text, type){
  const blob=new Blob([text||''],{type:type||'text/plain'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportPref(){
  const done=getPrefPairs().filter(p=>p.status==='done' && (p.chosen==='A'||p.chosen==='B'));
  const lines=done.map(p=>{ const chosen=p.chosen==='A'?p.respA:p.respB, rejected=p.chosen==='A'?p.respB:p.respA;
    const cs=p.chosen==='A'?p.confA:p.confB, rs=p.chosen==='A'?p.confB:p.confA;
    return JSON.stringify({ instruction:p.instruction, chosen, rejected, chosen_score:+(cs/100).toFixed(2), rejected_score:+(rs/100).toFixed(2), annotator_reasoning:p.reasoning||'' }); });
  download('rlhf_preferences.jsonl', lines.join('\n'), 'application/jsonl');
  log.event('pref:export',{rows:lines.length}); showToast('Exported '+lines.length+' RLHF preference pairs','ok');
}

/* ---- Global events ---- */
document.addEventListener('click', e=>{
  const stop=e.target.closest('[data-stop]');
  const t=e.target.closest('[data-action]');
  // close dropdowns when clicking outside
  if(!e.target.closest('.dropdown') && !e.target.closest('[data-action="toggle-proj"],[data-action="toggle-rel"],[data-action="toggle-notif"],[data-action="user-menu"],[data-action="toggle-adddata"]')) closeAllDropdowns();
  if(!t) return;
  const action=t.dataset.action;
  // Backdrop-close actions must only fire on a direct scrim click, not clicks inside the
  // stop container (the guide/modal body) that bubble up to the scrim's data-action.
  if(action==='close-ig' && stop) return;
  e.stopPropagation();
  dispatch(action, {...t.dataset, do:t.dataset.do});
});
// modal/palette scrim: only close when clicking the backdrop itself
document.addEventListener('mousedown', e=>{
  if(e.target.classList && e.target.classList.contains('modal-scrim')) closeModal();
  if(e.target.classList && e.target.classList.contains('palette-scrim')) closePalette();
});
// Live input handling for range sliders / fields that must NOT trigger a full re-render (§29 notes 49, 51)
document.addEventListener('input', e=>{
  const t=e.target.closest('[data-action]'); if(!t) return; const a=t.dataset.action;
  if(a==='mon-weight'){ const c=monitorDraft(); if(!c) return; const s=c.signals[+t.dataset.i]; if(s){ s.weight=+t.value; const lbl=t.nextElementSibling; if(lbl) lbl.textContent=t.value+'%'; updateMonitorTotals(); } }
  else if(a==='mon-tier2'){ const c=monitorDraft(); if(!c) return; c.tier2=+t.value; const l=el('mon-tier2'); if(l) l.textContent=c.tier2+'%'; const cost=el('mon-cost'); if(cost) cost.textContent=estMonitorCost(c); }
  else if(a==='mon-field'){ const c=monitorDraft(); if(c) c[t.dataset.key]=t.value; }
  else if(a==='lineage-search-live'){ appState.lineageRowQuery=t.value; }
  else if(a==='agent-filter'){ appState.agentFilter=t.value; const box=el('agent-log'); if(box) box.innerHTML=logEntriesHtml(getAgentLog()); }
});

document.addEventListener('keydown', e=>{
  const mod=e.metaKey||e.ctrlKey;
  if(mod && e.key.toLowerCase()==='k'){ e.preventDefault(); if(appState.paletteOpen) closePalette(); else if(currentUser) openPalette(); return; }
  if(e.key==='Escape'){ if(appState.paletteOpen){ closePalette(); return; } if(el('overlays').innerHTML){ closeModal(); return; } if(el('panel')&&el('panel').classList.contains('is-open')){ closePanel(); return; } closeAllDropdowns(); return; }
  if(appState.paletteOpen){
    const items=window._paletteItems||[];
    if(e.key==='ArrowDown'){ e.preventDefault(); appState.paletteSel=Math.min(items.length-1, appState.paletteSel+1); renderPalette(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); appState.paletteSel=Math.max(0, appState.paletteSel-1); renderPalette(); }
    else if(e.key==='Enter'){ e.preventDefault(); runPaletteItem(appState.paletteSel); }
    return;
  }
  // review queue keyboard shortcuts (only when not typing in a field)
  if(currentUser && currentView==='review' && !el('overlays').innerHTML){
    const typing = e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
    const tab=appState.reviewTab; const k=e.key.toLowerCase();
    if(tab==='datasets'){
      const q=reviewQueue(); const cur=q[appState.reviewIndex]; if(!cur) return;
      if(typing) return;
      if(k==='a'){ reviewRow(cur.row.id,'approve',true); }
      else if(k==='r'){ reviewRow(cur.row.id,'reject',true); }
      else if(k==='e'){ editRowModal(cur.row.id,true); }
      else if(k==='s'){ appState.reviewIndex++; renderView(); }
    } else if(tab==='audio'){
      const q=audioCorrQueue(); const sg=q[appState.reviewIndex]; if(!sg) return;
      if(e.key==='ArrowRight'){ appState.reviewIndex++; renderView(); return; }
      if(e.key==='ArrowLeft'){ appState.reviewIndex=Math.max(0,appState.reviewIndex-1); renderView(); return; }
      if(typing) return;
      if(k==='a') audioCorrect(sg.id,'accept'); else if(k==='s') audioCorrect(sg.id,'save'); else if(k==='d') audioCorrect(sg.id,'discard');
    } else if(tab==='video'){
      const q=videoCorrQueue(); const fr=q[appState.reviewIndex]; if(!fr) return;
      if(e.key==='ArrowRight'){ appState.reviewIndex++; renderView(); return; }
      if(e.key==='ArrowLeft'){ appState.reviewIndex=Math.max(0,appState.reviewIndex-1); renderView(); return; }
      if(typing) return;
      if(k==='a') videoCorrect(fr.id,'accept'); else if(k==='s') videoCorrect(fr.id,'save'); else if(k==='d') videoCorrect(fr.id,'discard');
    } else if(tab==='pref'){
      const q=prefQueue(); const p=q[appState.prefIndex]; if(!p) return;
      if(e.key==='ArrowRight'){ appState.prefIndex++; renderView(); return; }
      if(typing) return; // A/B/T/X shouldn't fire while typing the reasoning
      if(k==='a'){ p.chosen='A'; renderView(); } else if(k==='b'){ p.chosen='B'; renderView(); }
      else if(k==='t'){ p.chosen='tie'; renderView(); } else if(k==='x'){ p.chosen='both_bad'; renderView(); }
    }
  }
});

// Global error nets (CLAUDE.md §7)
window.addEventListener('error', e=>{ log.error('[uncaught]', e.error||e.message); showToast('Unexpected error — see console','error'); });
window.addEventListener('unhandledrejection', e=>{ log.error('[promise]', e.reason); showToast('Unexpected error — see console','error'); });

/* ---- Boot ---- */
function initMockData(){
  // Materialise dataset rows + rollups now that all mock logic (Section E) is defined.
  datasets.forEach(d=>{ d.rows = buildRows(d._seed, d._count); finaliseDataset(d); });
  // Attach rubric + precompute completed eval results.
  evalRuns.forEach(e=>{ e.rubric = RUBRIC_DEFAULT.map(n=>({dimension:n, weight:20})); if(e.status==='completed') computeEval(e); });
  log.info('[boot] mock data ready — '+datasets.length+' datasets, '+datasets.reduce((a,d)=>a+d.totalRows,0)+' rows');
  initDocuments(); // document ingestion mock data (spec §19)
  initBulkJobs();  // bulk ingestion mock data (spec §20)
  initAudioVideo();// audio & video mock data (spec §21)
  initInferences();// inference monitor mock data (spec §23)
  initMonitorConfigs();// monitor configuration per tenant (spec §29)
  initColdStart(); // cold-start monitor + corpus seeds (spec §31)
  initAgents();    // agentic layer (spec §33)
  initPrefPairs(); // RLHF preference pairs (spec §24)
}
function boot(){ log.info('[boot] Cueval prototype starting'); initMockData(); renderLogin(); }
boot();
