<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cueval — by Lynkstr Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   1. DESIGN TOKENS  (product spec §2 — single source of truth)
   ============================================================ */
:root{
  --bg-base:#0A0A0F; --bg-surface:#111118; --bg-elevated:#1A1A24; --bg-hover:#1F1F2E;
  --border:#2A2A3A; --border-active:#3D3D5C;
  --coral:#E85D26; --coral-dim:#C4410C; --coral-glow:rgba(232,93,38,0.15);
  --pink:#D63384; --pink-dim:rgba(214,51,132,0.15);
  --text-primary:#F0F0F8; --text-secondary:#9898B0; --text-muted:#5A5A72;
  --green:#22C55E; --yellow:#EAB308; --red:#EF4444; --blue:#3B82F6;
  --gradient-brand:linear-gradient(135deg,#E85D26,#D63384);
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --dock-w:64px; --topbar-h:48px; --panel-w:380px;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --t-fast:150ms; --t-med:200ms; --t-panel:250ms;
}
/* ============================================================
   2. RESET + BASE
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);
  font-size:14px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:2px solid var(--bg-base)}
::-webkit-scrollbar-thumb:hover{background:var(--border-active)}
:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:4px}
.mono{font-family:var(--font-mono)}
.display{font-family:var(--font-display)}
.muted{color:var(--text-muted)} .secondary{color:var(--text-secondary)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.hidden{display:none!important}
/* ============================================================
   3. LAYOUT PRIMITIVES  (shell, dock, topbar, canvas, panel)
   ============================================================ */
#app{height:100vh;width:100vw;position:relative}
.shell{display:grid;grid-template-columns:var(--dock-w) 1fr;height:100vh;position:relative}
.shell-main{display:grid;grid-template-rows:var(--topbar-h) 1fr;min-width:0;position:relative}
.canvas{overflow:hidden;position:relative;min-height:0}
.canvas-scroll{position:absolute;inset:0;overflow-y:auto;padding:28px 32px 48px}
.view-anim{animation:viewIn var(--t-med) ease-out}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Orbital dock */
/* Orbital dock — icon rail at rest (64px), expands on hover to reveal group labels + item labels */
.dock{position:absolute;top:0;left:0;bottom:0;width:var(--dock-w);
  background:rgba(17,17,24,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  padding:12px 9px;gap:3px;z-index:40;overflow:hidden;transition:width var(--t-med) ease}
.dock:hover,.dock:focus-within{width:230px;box-shadow:12px 0 46px rgba(0,0,0,.42)}
.dock-logo{width:40px;height:40px;border-radius:12px;background:var(--gradient-brand);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:700;color:#fff;
  font-size:20px;margin:0 0 8px 2px;box-shadow:0 4px 18px var(--coral-glow);flex-shrink:0}
.dock-group{display:flex;flex-direction:column;gap:2px}
.dock-group+.dock-group{margin-top:5px;padding-top:6px;border-top:1px solid var(--border)}
.dock-glabel{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-muted);padding:1px 8px 3px;white-space:nowrap;opacity:0;transition:opacity var(--t-fast)}
.dock:hover .dock-glabel,.dock:focus-within .dock-glabel{opacity:1}
.dock-item{position:relative;display:flex;align-items:center;gap:10px;border-radius:13px;padding:0;height:44px;
  color:var(--text-secondary);transition:background var(--t-fast),color var(--t-fast);width:100%;text-align:left}
.dock-ic{position:relative;width:44px;min-width:44px;height:44px;border-radius:13px;display:grid;place-items:center;transition:transform var(--t-fast)}
.dock-ic svg{width:21px;height:21px}
.dock-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.dock-item:hover .dock-ic{transform:scale(1.08)}
.dock-item.is-active{color:var(--coral)}
.dock-item.is-active .dock-ic{background:var(--coral-glow);box-shadow:inset 0 0 0 2px var(--coral),0 0 14px var(--coral-glow)}
.dock-label{white-space:nowrap;font-size:13px;font-weight:500;opacity:0;transition:opacity var(--t-fast)}
.dock:hover .dock-label,.dock:focus-within .dock-label{opacity:1}
.dock-badge{position:absolute;top:-1px;right:-1px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;
  background:var(--coral);color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;
  border:2px solid var(--bg-base)}
.dock-badge.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--coral-glow)}50%{box-shadow:0 0 0 6px transparent}}
.dock-spacer{flex:1}
.dock-avatar{width:38px;height:38px;border-radius:50%;background:var(--gradient-brand);display:grid;place-items:center;
  font-weight:600;color:#fff;font-size:14px}
@media (prefers-reduced-motion:reduce){.dock,.dock-ic{transition:none}}

/* Top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--border);
  background:var(--bg-surface);z-index:30}
.topbar-brand{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.3px}
.topbar-brand small{font-family:var(--font-body);font-weight:500;color:var(--text-muted);font-size:11px;margin-left:6px}
.topbar-spacer{flex:1}
.selectbox{position:relative}
.selectbox>button{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:9px;border:1px solid var(--border);
  background:var(--bg-elevated);color:var(--text-primary);font-weight:500;transition:border var(--t-fast)}
.selectbox>button:hover{border-color:var(--border-active)}
.selectbox .chev{width:14px;height:14px;color:var(--text-muted)}
.dropdown{position:absolute;top:calc(100% + 6px);left:0;min-width:230px;background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:12px;padding:6px;z-index:70;box-shadow:0 14px 40px rgba(0,0,0,.5)}
.dropdown.right{left:auto;right:0}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;width:100%;text-align:left;
  transition:background var(--t-fast)}
.dropdown-item:hover{background:var(--bg-hover)}
.dropdown-item.is-active{color:var(--coral)}
.dropdown-sep{height:1px;background:var(--border);margin:6px 4px}
.dropdown-head{padding:8px 10px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
.icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text-secondary);
  position:relative;transition:background var(--t-fast),color var(--t-fast)}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.icon-btn svg{width:19px;height:19px}
.notif-dot{position:absolute;top:5px;right:6px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--coral);
  color:#fff;font-size:9px;font-weight:600;display:grid;place-items:center;border:2px solid var(--bg-surface)}

/* Right panel */
.panel{position:absolute;top:0;right:0;height:100%;width:var(--panel-w);background:var(--bg-surface);
  border-left:1px solid var(--border);transform:translateX(100%);transition:transform var(--t-panel) ease-out;
  z-index:50;display:flex;flex-direction:column;box-shadow:-20px 0 50px rgba(0,0,0,.4)}
.panel.is-open{transform:none}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.panel-body{overflow-y:auto;padding:18px;flex:1}
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity var(--t-panel);z-index:45}
.scrim.is-open{opacity:1;pointer-events:auto}

/* ============================================================
   4. COMPONENTS
   ============================================================ */
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.card.hover{transition:border var(--t-fast),transform var(--t-fast);cursor:pointer}
.card.hover:hover{border-color:var(--border-active);transform:translateY(-2px)}
.card-title{font-weight:600;font-size:15px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column}
.flex{display:flex;align-items:center}
.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.wrap{flex-wrap:wrap}
.page-h{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:-.5px}
.page-sub{color:var(--text-secondary);margin-top:4px}
.section-h{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);font-weight:600;margin-bottom:12px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:9px;font-weight:600;font-size:13px;
  transition:background var(--t-fast),border var(--t-fast),opacity var(--t-fast);border:1px solid transparent;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:var(--coral-dim)}
.btn-ghost{background:var(--bg-elevated);border-color:var(--border);color:var(--text-primary)}
.btn-ghost:hover{border-color:var(--border-active);background:var(--bg-hover)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-green{background:var(--green);color:#04210f}.btn-green:hover{opacity:.88}
.btn-red{background:var(--red);color:#2a0606}.btn-red:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid transparent}
.pill svg{width:12px;height:12px}
.pill-green{background:rgba(34,197,94,.14);color:#4ade80;border-color:rgba(34,197,94,.3)}
.pill-yellow{background:rgba(234,179,8,.14);color:#facc15;border-color:rgba(234,179,8,.3)}
.pill-red{background:rgba(239,68,68,.14);color:#f87171;border-color:rgba(239,68,68,.3)}
.pill-blue{background:rgba(59,130,246,.14);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.pill-coral{background:var(--coral-glow);color:#fb923c;border-color:rgba(232,93,38,.3)}
.pill-pink{background:var(--pink-dim);color:#f472b6;border-color:rgba(214,51,132,.3)}
.pill-muted{background:var(--bg-hover);color:var(--text-secondary);border-color:var(--border)}
.badge-fmt{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:5px;background:var(--bg-hover);
  color:var(--text-secondary);border:1px solid var(--border);text-transform:uppercase}

.bignum{font-family:var(--font-display);font-weight:700;font-size:34px;line-height:1;letter-spacing:-1px}
.score-good{color:var(--green)}.score-mid{color:var(--yellow)}.score-bad{color:var(--red)}

.meter{height:8px;border-radius:6px;background:var(--bg-hover);overflow:hidden}
.meter-fill{height:100%;border-radius:6px;width:0;transition:width 600ms ease-out}
.bar-lang{display:flex;height:12px;border-radius:6px;overflow:hidden;background:var(--bg-hover)}
.bar-lang span{height:100%}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-surface);z-index:1}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background var(--t-fast)}
.tbl tbody tr:hover{background:var(--bg-hover)}
.tbl tbody tr.is-sel{background:var(--coral-glow)}
.truncate{max-width:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-wide{width:34%}

.input{width:100%;padding:9px 12px;border-radius:9px;background:var(--bg-base);border:1px solid var(--border);
  color:var(--text-primary);transition:border var(--t-fast)}
.input:focus{border-color:var(--coral);outline:none}
.input::placeholder{color:var(--text-muted)}
textarea.input{resize:vertical;min-height:90px;font-family:var(--font-mono);font-size:12px;line-height:1.6}
.field-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:5px;display:block}
.field-err{color:var(--red);font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px}

.chip{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elevated);font-size:12px;
  color:var(--text-secondary);cursor:pointer;transition:all var(--t-fast)}
.chip:hover{border-color:var(--border-active)}
.chip.is-on{background:var(--coral-glow);border-color:var(--coral);color:#fb923c}

.kbd{font-family:var(--font-mono);font-size:11px;background:var(--bg-hover);border:1px solid var(--border);
  border-radius:5px;padding:1px 6px;color:var(--text-secondary)}

/* Modal */
.modal-scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:200;
  animation:fadeIn var(--t-med)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);width:min(560px,92vw);
  max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:viewIn var(--t-med) ease-out}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-body{padding:20px}
.modal-foot{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* Toast */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:11px;background:var(--bg-elevated);
  border:1px solid var(--border);box-shadow:0 14px 40px rgba(0,0,0,.5);font-size:13px;font-weight:500;animation:toastIn var(--t-med) ease-out}
.toast svg{width:17px;height:17px;flex-shrink:0}
.toast.ok{border-color:rgba(34,197,94,.4)} .toast.ok svg{color:var(--green)}
.toast.error{border-color:rgba(239,68,68,.4)} .toast.error svg{color:var(--red)}
.toast.info svg{color:var(--blue)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Command palette */
.palette-scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:250;
  display:flex;justify-content:center;align-items:flex-start;padding-top:12vh;animation:fadeIn var(--t-med)}
.palette{width:min(620px,92vw);background:var(--bg-elevated);border:1px solid var(--border-active);border-radius:var(--r-lg);
  overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.7);animation:viewIn var(--t-med) ease-out}
.palette-input{width:100%;padding:18px 20px;background:none;border:none;font-size:16px;border-bottom:1px solid var(--border)}
.palette-input:focus{outline:none}
.palette-results{max-height:52vh;overflow-y:auto;padding:8px}
.palette-group{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);padding:10px 12px 4px}
.palette-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer}
.palette-item .pi-ic{width:28px;height:28px;border-radius:8px;background:var(--bg-hover);display:grid;place-items:center;color:var(--text-secondary)}
.palette-item .pi-ic svg{width:15px;height:15px}
.palette-item.is-active{background:var(--coral-glow)}
.palette-item.is-active .pi-ic{color:var(--coral)}
.palette-hint{font-size:11px;color:var(--text-muted);margin-left:auto}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:56px 20px;gap:14px}
.empty svg{width:52px;height:52px;color:var(--text-muted)}
.empty-title{font-weight:600;font-size:15px}
.empty-sub{color:var(--text-secondary);max-width:340px}
/* Compact empty / loading states for inline regions (UX redesign phase 3) */
.empty-mini{display:flex;flex-direction:column;align-items:center;gap:9px;padding:22px;text-align:center;color:var(--text-muted);font-size:13px}
.empty-mini svg{width:26px;height:26px;opacity:.55}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--coral);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Login */
.login{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden}
.login-mesh{position:absolute;inset:0;background:
  radial-gradient(60% 50% at 20% 20%,rgba(232,93,38,.14),transparent),
  radial-gradient(50% 50% at 82% 75%,rgba(214,51,132,.13),transparent);
  animation:mesh 14s ease-in-out infinite alternate}
@keyframes mesh{from{transform:translate(0,0) scale(1)}to{transform:translate(-4%,3%) scale(1.08)}}
.login-card{position:relative;width:min(400px,92vw);background:var(--bg-surface);border:1px solid var(--border);
  border-radius:20px;padding:34px 30px;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.login-logo{width:54px;height:54px;border-radius:16px;background:var(--gradient-brand);display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;color:#fff;font-size:26px;margin:0 auto 16px;box-shadow:0 8px 30px var(--coral-glow)}
.demo-list{border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-top:14px}
.demo-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg-elevated)}
.demo-body{max-height:0;overflow:hidden;transition:max-height var(--t-panel) ease}
.demo-body.is-open{max-height:340px;overflow-y:auto}
.demo-acct{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);cursor:pointer;font-size:12px}
.demo-acct:hover{background:var(--bg-hover)}

/* Impersonation banner */
.imp-banner{position:fixed;top:0;left:0;right:0;height:34px;background:var(--gradient-brand);color:#fff;display:flex;
  align-items:center;justify-content:center;gap:14px;font-size:12px;font-weight:600;z-index:150}
body.impersonating .shell,body.impersonating #app>.shell{margin-top:34px;height:calc(100vh - 34px)}

.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-node{position:relative;margin-bottom:18px}
.tl-node::before{content:"";position:absolute;left:-23px;top:4px;width:14px;height:14px;border-radius:50%;
  background:var(--bg-base);border:2px solid var(--coral)}

.radar-wrap{display:grid;place-items:center}
.delta-up{color:var(--green)}.delta-down{color:var(--red)}

.warn-banner{display:flex;align-items:center;gap:10px;padding:11px 15px;border-radius:11px;font-size:13px;font-weight:500;margin-bottom:16px}
.warn-yellow{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.35);color:#facc15}
.warn-orange{background:rgba(232,93,38,.1);border:1px solid rgba(232,93,38,.4);color:#fb923c}
.warn-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:#f87171}

/* Guide / About page */
.guide{max-width:960px;margin:0 auto}
.guide-hero{background:linear-gradient(135deg,rgba(232,93,38,.12),rgba(214,51,132,.1));border:1px solid var(--border-active);border-radius:var(--r-lg);padding:30px 28px}
.guide-logo{width:56px;height:56px;border-radius:16px;background:var(--gradient-brand);display:grid;place-items:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:28px;box-shadow:0 8px 30px var(--coral-glow)}
.pipe{display:flex;align-items:stretch;gap:6px;overflow-x:auto;padding-bottom:4px}
.pipe-step{flex:1;min-width:120px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 12px;text-align:center;position:relative}
.pipe-step .pipe-ic{width:34px;height:34px;border-radius:10px;background:var(--coral-glow);color:var(--coral);display:grid;place-items:center;margin:0 auto 8px}
.pipe-step .pipe-ic svg{width:18px;height:18px}
.pipe-arrow{align-self:center;color:var(--text-muted);flex-shrink:0}
.pipe-arrow svg{width:16px;height:16px}
.guide-mod{display:flex;gap:12px;align-items:flex-start;padding:14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-surface);transition:border var(--t-fast)}
.guide-mod:hover{border-color:var(--border-active)}
.guide-mod .gm-ic{width:38px;height:38px;border-radius:11px;background:var(--bg-hover);color:var(--coral);display:grid;place-items:center;flex-shrink:0}
.guide-mod .gm-ic svg{width:19px;height:19px}
.concept{padding:12px 0;border-bottom:1px solid var(--border)}
.concept:last-child{border-bottom:none}
.concept dt{font-weight:600;font-size:13px;margin-bottom:3px}
.concept dd{color:var(--text-secondary);font-size:13px}
.faq{border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;background:var(--bg-surface);overflow:hidden}
.faq summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-weight:600;font-size:14px}
.faq summary::-webkit-details-marker{display:none}
.faq summary:hover{background:var(--bg-hover)}
.faq summary .faq-chev{color:var(--text-muted);transition:transform var(--t-fast);flex-shrink:0}
.faq summary .faq-chev svg{width:18px;height:18px;display:block}
.faq[open] summary .faq-chev{transform:rotate(90deg)}
.faq[open] summary{color:var(--coral)}
.faq-body{padding:0 18px 16px;color:var(--text-secondary);font-size:13px;line-height:1.7}
.faq-body code{font-family:var(--font-mono);font-size:12px;background:var(--bg-hover);padding:1px 5px;border-radius:4px;color:var(--text-primary)}
.role-card{padding:14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-surface)}
.role-card.is-you{border-color:var(--coral);background:var(--coral-glow)}
.guide-toc{position:sticky;top:0}
.guide-toc a{display:block;padding:6px 10px;border-radius:8px;color:var(--text-secondary);font-size:13px;transition:background var(--t-fast)}
.guide-toc a:hover{background:var(--bg-hover);color:var(--text-primary)}
/* Dataset lineage flow (spec §26) */
.lineage{position:relative;padding-left:6px}
.lin-node{position:relative;padding-bottom:26px}
.lin-node:not(:last-child)::after{content:"";position:absolute;left:50%;bottom:4px;width:2px;height:22px;background:var(--border-active)}
.lin-node:not(:last-child)::before{content:"▼";position:absolute;left:50%;transform:translateX(-45%);bottom:-2px;color:var(--border-active);font-size:10px;z-index:1}
.lin-node .card{animation:linIn 500ms ease-out both}
@keyframes linIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
/* Inference feed new-row slide-in (spec §28 note 38) */
#mon-feed tr:first-child{animation:feedIn 400ms ease-out}
@keyframes feedIn{from{opacity:0;transform:translateY(-10px);background:var(--coral-glow)}to{opacity:1;transform:none}}

.ig-scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:260;display:flex;justify-content:center;align-items:flex-start;padding:4vh 16px;animation:fadeIn var(--t-med)}

.crumb-cur{color:var(--text-primary);font-weight:500}
.crumb-sep{color:var(--text-muted);opacity:.55}

    const r = rand();
    if(r < 0.45) row.reviewStatus = r<0.32 ? 'approved' : (r<0.4 ? 'rejected':'edited');
    if(row.reviewStatus!=='pending'){ row.reviewedBy = 'Ravi Kumar'; }
    rows.push(row); return row;
  };
  CLEAN_ROWS.forEach(r=>push(r[0],r[1],r[2]));
  for(let i=0;i<7;i++){ push('Distinguish a condition from a warranty in a contract.','', NEARDUP_BASE + (i?' It matters for the remedy available.':''),'en'); }
  PII_ROWS.forEach(r=>push(r[0],r[1],r[2]));
  SHORT_ROWS.forEach(r=>push(r[0],r[1],r[2]));
  FORMAT_ROWS.forEach(r=>push(r[0],r[1],r[2]));
  TOXIC_ROWS.forEach(r=>push(r[0],r[1],r[2]));
  INDIC_ROWS.forEach(r=>push(r[0],r[1],r[2],r[3]));
  // pad with clean variants until count reached
  let i=0; while(rows.length<count){ const b=CLEAN_ROWS[i%CLEAN_ROWS.length]; push(b[0],b[1],b[2]+' (case ref '+(1000+rows.length)+')'); i++; }
  return rows;
}

function detectLanguage(text){
  if(/[஀-௿]/.test(text)) return 'ta';
  if(/[ऀ-ॿ]/.test(text)) return 'hi';
  if(/[ఀ-౿]/.test(text)) return 'te';
  if(/[ಀ-೿]/.test(text)) return 'kn';
  if(/[ഀ-ൿ]/.test(text)) return 'ml';
  return 'en';
}
const PII_PATTERNS = [ /\b\d{10}\b/, /[a-z0-9._%+-]+@[a-z0-9.-]+/i, /\b\d{4}\s?\d{4}\s?\d{4}\b/, /\b[a-z]{5}\d{4}[a-z]\b/i ];
function hasPII(row){ const t=(row.output||'')+' '+(row.input||''); return PII_PATTERNS.some(p=>p.test(t)); }
const TOXIC_WORDS = ['fraudster','stupid','worthless','idiot','lazy','useless','shut up','starve','deserve their'];
function hasToxic(row){ const t=(row.output||'').toLowerCase(); return TOXIC_WORDS.some(w=>t.includes(w)); }
function tokenSet(t){ return new Set((t||'').toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(Boolean)); }
function jaccard(a,b){ const A=tokenSet(a),B=tokenSet(b); if(!A.size||!B.size) return 0; let inter=0; A.forEach(x=>{if(B.has(x))inter++;}); return inter/(A.size+B.size-inter); }
function hasFormatViolation(row){
  if(!row.instruction || row.instruction.length<10) return true;
  if(/json/i.test(row.instruction||'') && !/[{[]/.test(row.output||'')) return true;
  if(/(template|bullet|format)/i.test(row.instruction||'') && (row.output||'').length && !/[-•\n]|SECTION/i.test(row.output||'')) return true;
  return false;
}
function deriveFlags(row, existing){
  const flags=[];
  const out=row.output||'';
  const dup = existing.find(r=>r.output===out && out);
  const near = existing.find(r=>r!==row && jaccard(r.output,out)>0.7 && !flags.includes('duplicate'));
  if(dup) flags.push('duplicate');
  else if(near) flags.push('near-duplicate');
  if(out.length<20) flags.push('short-response');
  if(hasPII(row)) flags.push('pii-detected');
  if(hasFormatViolation(row)) flags.push('format-violation');
  if(hasToxic(row)) flags.push('toxic');
  if(out.length && out.length<40 && !flags.includes('short-response')) flags.push('low-clarity');
  return flags;
}
function scoreRow(row){
  let score=100; const out=row.output||'';
  if(out.length<20) score-=40; else if(out.length<50) score-=20;
  if(!row.instruction || row.instruction.length<10) score-=30;
  if(row.flags.includes('duplicate')) score-=50;
  if(row.flags.includes('near-duplicate')) score-=30;
  if(row.flags.includes('pii-detected')) score-=35;
  if(row.flags.includes('format-violation')) score-=25;
  if(row.flags.includes('toxic')) score-=60;
  return Math.max(0,Math.min(100,score));
}
function scoreBreakdown(row){
  const clarity = Math.max(0,Math.min(100, 100 - (row.flags.includes('low-clarity')?45:0) - (row.flags.includes('toxic')?50:0)));
  const completeness = Math.max(0,Math.min(100, Math.round(Math.min(100,(row.output||'').length/2)) - (row.flags.includes('short-response')?30:0)));
  const relevance = Math.max(0,Math.min(100, 100 - (row.flags.includes('format-violation')?40:0) - (row.flags.includes('near-duplicate')?30:0)));
  return { clarity, completeness, relevance };
}
function computeEval(e){
  const rand = mkRand(e._seed);
  const results = { A:{}, B:{} };

  results.B.Overall = +(e.rubric.reduce((s,d)=>s+results.B[d.dimension]*d.weight,0)/wsum).toFixed(1);

// Confidence/visual colour coding — consistent across all modalities (note 36).

// Audio quality score (spec §21)
function scoreAudioSegment(seg, file){
  let s=100; const snr=file.avgSnr, conf=seg.confidence, dur=seg.durationSec;
  if(snr<10) s-=40; else if(snr<15) s-=20;
  if(conf<50) s-=35; else if(conf<70) s-=15;
  if(file.speakerCount>2) s-=10;
  if(dur<3) s-=30; else if(dur>30) s-=10;
  return Math.max(0,Math.min(100,s));
}
// Video quality score (spec §21)
function scoreVideoFrame(fr){
  let s=100;
  if(fr.blurScore<40) s-=35;
  if(fr.darkness<30) s-=30;
  if(fr.captionConf<50) s-=25;
  if(fr.isDuplicate) s-=50;
  if(fr.hasFaces && !fr.consentFlag) s-=20;
  return Math.max(0,Math.min(100,s));
}

    const x=i*5+3; path+='<rect x="'+x+'" y="'+(20-h/2)+'" width="3" height="'+h+'" rx="1.5" fill="'+col+'" opacity="'+(0.5+base*0.5).toFixed(2)+'"/>'; }
  return '<svg viewBox="0 0 328 40" width="100%" height="52" preserveAspectRatio="none" aria-hidden="true">'+path+'</svg>';

// Wrap a render fn so one broken screen never white-screens the app.
function guard(fn, label){
  return function(...args){
    try{ return fn.apply(this,args); }
    catch(err){ log.error('['+label+'] render failed', err); showToast('Something went wrong in '+label+' — see console','error');
      return '<div class="empty"><div class="empty-title">This section failed to render.</div><div class="empty-sub secondary">The error was logged to the console. Try another screen.</div></div>'; }
  };
}

// Line chart (Canvas) — two series + optional marker (spec §23 note 39)
function drawLineChart(cv){
  try{
    const A=JSON.parse(cv.getAttribute('data-a')), B=JSON.parse(cv.getAttribute('data-b'));
    const marker=+cv.getAttribute('data-marker'); const w=cv.clientWidth||520, h=180;
    const dpr=window.devicePixelRatio||1; cv.width=w*dpr; cv.height=h*dpr; cv.style.height=h+'px';
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    const pad={l:34,r:12,t:14,b:22}; const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
    const all=A.concat(B); const max=Math.max(...all)*1.15||1, min=0;
    const xt=i=>pad.l + i/(A.length-1)*iw, yt=v=>pad.t + (1-(v-min)/(max-min))*ih;
    ctx.strokeStyle=TOKENS.border; ctx.fillStyle=TOKENS.muted; ctx.lineWidth=1; ctx.font='10px Inter';
    for(let g=0;g<=4;g++){ const y=pad.t+ih*g/4; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
      ctx.textAlign='right'; ctx.fillText(Math.round(max*(1-g/4))+'%', pad.l-6, y+3); }
    if(marker>=0){ const mx=xt(marker); ctx.strokeStyle=TOKENS.coral; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(mx,pad.t); ctx.lineTo(mx,pad.t+ih); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=TOKENS.coral; ctx.textAlign='center'; ctx.fillText('v1.2 deployed', mx, pad.t-3); }
    const line=(data,color)=>{ ctx.beginPath(); data.forEach((v,i)=>{ const x=xt(i),y=yt(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle=color; data.forEach((v,i)=>{ ctx.beginPath(); ctx.arc(xt(i),yt(v),2,0,7); ctx.fill(); }); };
    line(B,TOKENS.pink); line(A,TOKENS.coral);
  }catch(err){ log.error('[linechart] draw failed',err); }
}
// Donut chart (Canvas) — labelled segments (spec §23)
function drawDonut(cv){
  try{
    const data=JSON.parse(cv.getAttribute('data-donut')); const size=170, dpr=window.devicePixelRatio||1;
    cv.width=size*dpr; cv.height=size*dpr; cv.style.width=size+'px'; cv.style.height=size+'px';
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=size/2, cy=size/2, r=70, rin=42; const total=data.reduce((a,d)=>a+d.value,0)||1;
    const cols=[TOKENS.coral,TOKENS.pink,TOKENS.blue,TOKENS.yellow,'#8b5cf6',TOKENS.green];
    let ang=-Math.PI/2;
    data.forEach((d,i)=>{ const a2=ang+d.value/total*Math.PI*2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,ang,a2); ctx.closePath(); ctx.fillStyle=cols[i%cols.length]; ctx.fill(); ang=a2; });
    ctx.beginPath(); ctx.arc(cx,cy,rin,0,7); ctx.fillStyle=TOKENS.surface; ctx.fill();
  }catch(err){ log.error('[donut] draw failed',err); }
}

// Breadcrumb: parts = [ [label] (current) | [label, action, dataObj] (link) ], last is current.
function crumb(parts){

    let attrs='data-action="'+p[1]+'"'; if(p[2]) for(const k in p[2]) attrs+=' data-'+k+'="'+escapeAttr(p[2][k])+'"';

  return '<nav class="crumb" aria-label="Breadcrumb">'+out+'</nav>';
}

/* ---- Radar chart (Canvas 2D, ADR-6) ---- */
function drawRadar(cv){
  try{
    const dims = JSON.parse(cv.getAttribute('data-dims'));
    const A = JSON.parse(cv.getAttribute('data-a'));
    const B = JSON.parse(cv.getAttribute('data-b'));
    const dpr=window.devicePixelRatio||1; const size=260; cv.width=size*dpr; cv.height=size*dpr; cv.style.width=size+'px'; cv.style.height=size+'px';
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=size/2, cy=size/2, R=95, n=dims.length;
    const pt=(i,r)=>{ const ang=-Math.PI/2 + i/n*Math.PI*2; return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r]; };
    // grid
    ctx.strokeStyle=TOKENS.border; ctx.fillStyle=TOKENS.muted; ctx.lineWidth=1; ctx.font='10px Inter';
    for(let g=1;g<=4;g++){ ctx.beginPath(); for(let i=0;i<=n;i++){ const [x,y]=pt(i%n,R*g/4); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.closePath(); ctx.stroke(); }
    for(let i=0;i<n;i++){ const [x,y]=pt(i,R); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
      const [lx,ly]=pt(i,R+16); ctx.textAlign= Math.abs(lx-cx)<10?'center':(lx>cx?'left':'right'); ctx.fillText(truncate(dims[i],10),lx,ly); }
    const poly=(vals,color)=>{ ctx.beginPath(); dims.forEach((d,i)=>{ const [x,y]=pt(i,R*(vals[d]||0)/100); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.closePath();
      ctx.fillStyle=color+'33'; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke(); };
    poly(A,TOKENS.coral); poly(B,TOKENS.pink);
  }catch(err){ log.error('[radar] draw failed',err); }
}

function filteredRows(d){
  const f=appState.dsFilters; let rows=d.rows.slice();
  if(f.flag!=='all') rows=rows.filter(r=>r.flags.includes(f.flag));
  if(f.status!=='all') rows=rows.filter(r=>r.reviewStatus===f.status);
  if(f.sort==='score-asc') rows.sort((a,b)=>a.qualityScore-b.qualityScore);
  else if(f.sort==='score-desc') rows.sort((a,b)=>b.qualityScore-a.qualityScore);
  else if(f.sort==='flags') rows.sort((a,b)=>b.flags.length-a.flags.length);
  return rows;
}
function rowTable(d){
  const rows=filteredRows(d);
  if(!rows.length) return emptyState('check','No rows match','Try clearing filters to see more rows.','');
  const cap=Math.min(rows.length,120); // perf: cap DOM rows (CLAUDE.md §10)

      +'<td class="cell-wide"><div class="truncate">'+escapeHtml(truncate(r.instruction||'—',60))+'</div></td>'
      +'<td class="cell-wide"><div class="truncate secondary">'+escapeHtml(truncate(r.output||'—',60))+'</div></td>'
      +'<td><span class="pill pill-'+pillColorForScore(r.qualityScore)+'">'+r.qualityScore+'</span></td>'
      +'<td>'+(r.flags.length?'<span class="pill pill-muted">'+r.flags.length+' '+ICON.flag+'</span>':'<span class="muted">—</span>')+'</td>'
      +'<td>'+escapeHtml(LANG_LABEL[r.language]||r.language)+'</td>'

  const more = rows.length>cap ? '<tr><td colspan="7" class="muted" style="text-align:center;padding:12px">Showing first '+cap+' of '+rows.length+' rows (filter to narrow)</td></tr>' : '';
  return '<table class="tbl"><thead><tr><th>#</th><th>Instruction</th><th>Response</th><th>Score</th><th>Flags</th><th>Lang</th><th>Status</th></tr></thead><tbody>'+body+more+'</tbody></table>';

function flagExplain(f,row){
  switch(f){ case 'duplicate':return 'Exact duplicate of another row in this dataset.';
    case 'near-duplicate':return 'High token overlap (Jaccard > 0.7) with a similar row.';
    case 'short-response':return 'Output is '+(row.output||'').length+' chars — below the 20-char minimum.';
    case 'format-violation':return 'Missing instruction or output does not match the requested format/schema.';
    case 'pii-detected':return 'Matches a PII pattern (phone / email / Aadhaar / PAN).';
    case 'toxic':return 'Contains toxic or biased language from the moderation list.';
    case 'low-clarity':return 'Response is short and low in informational content.'; default:return ''; }
}

function evalResultView(e){

      +'<td class="mono '+(delta>=0?'delta-up':'delta-down')+'">'+(delta>=0?'+':'')+delta+' '+(delta>=0?'▲':'▼')+'</td></tr>'; });
  const table='<table class="tbl"><thead><tr><th>Dimension</th><th>Checkpoint A</th><th>Checkpoint B</th><th>Delta</th></tr></thead><tbody>'+rowsHtml+'</tbody></table>';

const PIPELINE=['draft','in-review','approved','training','deployed'];
function screenReleases(){
  const rels=getReleases();
  const head='<div class="row-between"><div><h1 class="page-h">Releases</h1><p class="page-sub">Pipeline from draft to deployment</p></div></div>';
  if(!rels.length) return head+'<div class="mt24">'+emptyState('rocket','No releases yet','Create a release to manage the pipeline.','')+'</div>';
  let cols='';
  PIPELINE.forEach(stage=>{ const items=rels.filter(r=>r.status===stage);
    let cards=''; items.forEach(r=>{ const ds=datasetForRelease(r.id); const ev=byId(evalRuns,r.evalRunId); const blocking=releaseGates(r).filter(g=>!g.ok).length;
      cards+='<div class="card hover" data-action="open-release" data-id="'+r.id+'" style="padding:12px"><div class="card-title" style="font-size:13px">'+escapeHtml(r.name)+'</div>'
        +'<div class="flex gap8 mt8" style="font-size:11px"><span class="'+(ds?scoreClass(ds.overallScore):'')+'">DS '+(ds?ds.overallScore:'—')+'</span><span class="secondary">Eval '+(ev&&ev.results?ev.results.B.Overall:'—')+'</span></div>'
        +(blocking?'<div class="pill pill-red mt8">'+ICON.warn+blocking+' blocking</div>':'<div class="pill pill-green mt8">'+ICON.check+'clear</div>')+'</div>'; });
    cols+='<div style="min-width:0"><div class="section-h flex gap6" style="justify-content:space-between">'+stage.replace('-',' ')+'<span class="muted">'+items.length+'</span></div><div class="stack gap8">'+(cards||'<div class="muted" style="font-size:12px;padding:8px">—</div>')+'</div></div>'; });

function releaseGates(r){
  const ds=datasetForRelease(r.id); const ev=byId(evalRuns,r.evalRunId);
  const pend=ds?ds.rows.filter(x=>x.reviewStatus==='pending').length:0;
  return [
    {label:'Dataset uploaded', ok:!!ds},
    {label:'Curation score > 70', ok:ds&&ds.overallScore>70},
    {label:'Human review 100% complete', ok:pend===0, note:pend?(pend+' rows pending'):''},
    {label:'Eval run completed', ok:!!(ev&&ev.results)},
    {label:'Architect approval', ok:['approved','training','deployed'].includes(r.status)},
    {label:'PM sign-off', ok:['approved','training','deployed'].includes(r.status)},
  ];
}
function openReleaseDetail(id){
  const r=byId(getReleases(),id); if(!r||!assertTenant(r)) return;
  const ds=datasetForRelease(r.id); const gates=releaseGates(r);
  let gh=''; gates.forEach(g=>{ gh+='<div class="flex gap8" style="padding:8px 0;border-bottom:1px solid var(--border)">'
    +(g.ok?'<span style="color:var(--green)">'+ICON.check+'</span>':'<span style="color:var(--red)">'+ICON.x+'</span>')
    +'<span>'+escapeHtml(g.label)+'</span>'+(g.note?'<span class="pill pill-yellow" style="margin-left:auto">'+escapeHtml(g.note)+'</span>':'')+'</div>'; });
  const canApprove = can('Releases');
  const actions = canApprove ? '<div class="flex gap8 mt16"><button class="btn btn-primary" data-action="approve-release" data-id="'+r.id+'"'+(gates.some(g=>!g.ok)?' disabled':'')+'>'+ICON.check+'Approve Release</button><button class="btn btn-ghost" data-action="request-changes" data-id="'+r.id+'">Request Changes</button></div>' : '<div class="muted mt16">Approval requires Architect / PM / Admin role.</div>';
  const html='<div class="flex gap8">'+statusPill(r.status)+'<span class="secondary">'+escapeHtml(r.createdAt)+'</span></div>'
    +'<div class="section-h mt16">Dataset</div><div class="card" style="padding:12px">'+escapeHtml(ds?ds.name:'—')+' · score '+(ds?ds.overallScore:'—')+'</div>'
    +'<div class="section-h mt16">Release gates'+infoTip('gate')+'</div>'+gh+actions;
  openPanel(html, r.name);
}

const FAQS = [
  ['What exactly is Cueval?','Cueval is an AI dataset curation and evaluation platform. It takes you from raw data all the way to a release-ready, fine-tuning dataset: ingest → clean & score → human review → experiment → eval → release approval. It is built by Lynkstr Labs.'],
  ['Where do I start?','Pick or create a Project, then either upload a dataset directly (Datasets → Upload) or upload documents (Documents) to extract training data from PDFs and scans. Once rows exist, work the Review Queue to approve them, run an Eval to compare checkpoints, and finally move a Release through its gates.'],
  ['How is the quality score calculated?','Every row starts at 100 and loses points for problems: short responses, exact/near duplicates, detected PII, format violations, and toxic language. The final 0–100 score is colour-coded — green ≥70, yellow 45–69, red below 45. Open any row to see the clarity / completeness / relevance breakdown.'],
  ['What do the flags mean?','Flags are auto-detected issues: <code>duplicate</code>, <code>near-duplicate</code>, <code>short-response</code>, <code>format-violation</code>, <code>pii-detected</code>, <code>toxic</code>, and <code>low-clarity</code>. Each flag on a row explains itself when you open the row detail.'],
  ['How does document ingestion work?','Drop in PDFs, scans, or images. Digital PDFs are text-extracted directly; scanned files go through deskew → layout detection → per-region script detection → OCR → confidence scoring. Regions below 60% confidence become OCR correction tasks. After extraction you chunk the document and can synthesise instruction pairs.'],
  ['What is the difference between My Documents and Bulk Ingestion?','My Documents is for single or small-batch uploads you process by hand. Bulk Ingestion is corpus-scale (1K–500K files) from an S3 bucket, folder, or API push — configured through a wizard and monitored on a live dashboard with a worker pool, dedup report, and cost tracker.'],
  ['How do OCR corrections work?','When a scan region is below the confidence threshold, it lands in Review Queue → OCR Corrections. You see the original scan on the left and the editable OCR text on the right, and can Accept, Edit & Accept, or Flag for Expert. At corpus scale, corrections roll up into an Annotation Project with per-annotator assignments and ETAs.'],
  ['What keyboard shortcuts exist?','In the Review Queue (Datasets tab): <code>A</code> approve, <code>R</code> reject, <code>E</code> edit, <code>S</code> skip. Anywhere: <code>⌘K</code> / <code>Ctrl+K</code> opens the command palette to jump to any project, dataset, row, run, or action. <code>Esc</code> closes panels, modals, and the palette.'],
  ['How does the Eval Harness work?','Choose two checkpoints and a rubric of weighted dimensions (totalling 100%). Running an eval produces per-dimension scores for each checkpoint, a delta, an overlaid radar chart, and a cost estimate. Rows where the judge confidence is low are routed to human review.'],

  ['Is my data isolated from other organisations?','Yes. Cueval is multi-tenant with strict isolation — every record is scoped to your tenant, resolved at login and fixed for your session. You can never see another tenant\'s projects, datasets, or documents. Only the Lynkstr Labs Super Admin has a separate cross-tenant operator view.'],
  ['What are plan limits and what happens if I hit them?','Each tenant has a plan (Starter / Pro / Enterprise) with monthly caps on rows, eval runs, seats, and projects. You\'ll see a yellow warning around 70–85% usage, orange above 85%, and at the limit uploads are blocked with an upgrade prompt. Usage meters live in Settings → Organisation.'],
  ['How do I export a cleaned dataset?','On the Datasets screen, click Export. Only approved (and edited) rows are included, and you can choose the output format — JSONL, CSV, Axolotl, or LLaMA-Factory — so it drops straight into your training pipeline.'],

function initDocuments(){
  documents=[]; ocrRegions=[]; chunks=[];
  DOC_SEEDS.forEach(s=>{ buildDocument(s); });
  log.info('[boot] documents ready — '+documents.length+' docs, '+ocrRegions.length+' OCR regions');
}
function buildDocument(s){
  const rand=mkRand(s.seed);
  const scripts=detectScriptsFromName(s.name);
  const digital = s.kind==='digital';
  const doc={ id:s.id, tenantId:s.tenantId, projectId:s.projectId, name:s.name,
    format: digital?'pdf-digital':'pdf-scanned', pages:s.pages, uploadedBy:s.uploadedBy, uploadedAt:s.uploadedAt,
    scriptsDetected:scripts, chunks:[], synthesisedPairs:[], status:'processed' };
  if(digital){
    doc.avgOcrConfidence=null; doc.regionsTotal=Math.round(s.pages*1.5); doc.regionsFlagged=0;
    doc.status='ready-chunk';
  } else {
    // generate regions with EXACTLY s.flagged below-60 (<60) regions + higher-confidence rest.
    const total = Math.max(s.flagged+Math.round(s.pages*1.2), s.flagged+6);
    for(let i=0;i<total;i++){
      const isLow = i < s.flagged;                                  // deterministic count
      const script = scripts.length>1 ? (rand()<0.5?scripts[0]:scripts[scripts.length-1]) : scripts[0];
      const rtype = REGION_TYPES[Math.floor(rand()*REGION_TYPES.length)];
      let conf;
      if(isLow){ conf = 40 + Math.floor(rand()*20); }               // 40-59 → flagged
      else if(rtype==='table'){ conf = 60 + Math.floor(rand()*18); } // 60-77 tables
      else if(script!=='en'){ conf = 62 + Math.floor(rand()*24); }   // 62-85 Indic
      else { conf = 72 + Math.floor(rand()*20); }                    // 72-91 English
      const clean=ocrSample(rand, script);
      const region={ id:'reg'+(++REGION_UID), documentId:doc.id, tenantId:doc.tenantId,

const CHUNK_STRATEGIES=[
  {key:'structural', label:'Structural', desc:'Split at headings/sections — best for contracts, circulars with clear structure.'},
  {key:'semantic', label:'Semantic', desc:'Split when the topic shifts — best for research papers.'},
  {key:'paragraph', label:'Paragraph', desc:'Split at paragraph boundaries — safe default for unstructured scans.'},
  {key:'fixed', label:'Fixed size', desc:'Split every N tokens — reliable fallback.'},
];
function docText(d){
  // assemble text from OCR regions (corrected where available) or a digital placeholder
  const regs=regionsForDoc(d.id);
  if(regs.length) return regs.map(r=>(r.regionType==='heading'?'\n## ':'')+ (r.correctedText||r.cleanText)).join('\n\n');
  // digital placeholder body
  const paras=[]; for(let i=0;i<d.pages;i++){ paras.push((i%4===0?'## Section '+(i/4+1|0)+'\n':'')+OCR_SAMPLES.en[i%OCR_SAMPLES.en.length]); }
  return paras.join('\n\n');
}
function computeChunks(d){
  const text=docText(d); const strat=appState.chunkStrategy; const size=appState.chunkSize;
  let segs=[];
  if(strat==='structural'||strat==='semantic'){ segs=text.split(/\n(?=## )/).filter(s=>s.trim()); }
  else if(strat==='paragraph'){ segs=text.split(/\n\n+/).filter(s=>s.trim()); }
  else { const words=text.split(/\s+/); const per=Math.max(20,Math.round(size/1.3)); for(let i=0;i<words.length;i+=per) segs.push(words.slice(i,i+per).join(' ')); }
  // merge tiny segs up toward target size for structural/paragraph
  return segs.map((s,i)=>{ const heading=(s.match(/## (.+)/)||[])[1]||'—'; const toks=Math.max(1,Math.round(s.split(/\s+/).length*1.3));
    return { text:s.replace(/## /,'').trim(), tokenCount:toks, headingContext:heading, chunkIndex:i, sourcePages:[1+i] }; });
}

  let warnHtml=''; warns.forEach(w=>warnHtml+='<div class="warn-banner warn-yellow" style="margin-bottom:8px">'+ICON.warn+'<span>'+w+'</span></div>');

  return back+header+locked+warnHtml+assignTable+docTable;
}

/* ---- Bulk animation (spec §20 notes 23-27) ---- */
let bulkTick=0;
function startBulkAnimation(){
  clearScreenTimers(); bulkTick=0;
  const job=activeBulkJob(); if(!job || job.status!=='in_progress') return;
  // counters every 2s — advance the job while keeping the funnel math consistent
  registerTimer(setInterval(()=>{
    if(currentView!=='documents' || appState.docTab!=='bulk' || appState.bulkView!=='dashboard'){ clearScreenTimers(); return; }
    advanceBulkJob(job);
    const n=el('bulk-live'); if(n) n.innerHTML=bulkLiveHtml(job);
  }, 2000));
  // worker doc rotation every 3s
  registerTimer(setInterval(()=>{ bulkTick++;
    if(currentView!=='documents' || appState.docTab!=='bulk' || appState.bulkView!=='dashboard'){ clearScreenTimers(); return; }
    const n=el('bulk-live'); if(n) n.innerHTML=bulkLiveHtml(job);
  }, 3000));
  log.event('bulk:animate',{job:job.id});
}
function advanceBulkJob(job){
  const remaining=job.totalFiles - job.duplicatesSkipped - job.failed - job.complete;
  if(remaining<=0){ job.processing=0; job.queued=0; job.status='complete'; job.estimatedCompletion='done'; return; }
  const delta=Math.min(remaining, 20+Math.floor(Math.random()*11)); // ~10-15 docs/sec over 2s
  job.complete+=delta;
  job.queued=Math.max(0, job.totalFiles - job.duplicatesSkipped - job.failed - job.complete - job.processing);
  job.processing=Math.min(job.queued>0?200:0, job.queued);
  // keep funnel consistent + increment corrected/cost proportionally
  job.funnel=deriveFunnel(job);
  job.ocrRegionsCorrected=Math.min(job.ocrRegionsFlagged, job.ocrRegionsCorrected+Math.floor(delta*0.4));
  job.computeCostSoFar=Math.min(job.computeCostTotal, job.computeCostSoFar + delta*0.18);
  const pct=job.complete/job.totalFiles;
  job.estimatedCompletion = pct>=0.99?'finishing…':(Math.max(1,Math.round((1-pct)*40))+'h remaining');
}

function langList(code){ return code.split('+').map(c=>c==='en'?'en':c); }
function buildAudioFile(s){
  const rand=mkRand(s.seed); const langs=langList(s.language);
  const file={ id:s.id, tenantId:s.tenantId, projectId:s.projectId, name:s.name, durationSec:s.durationSec,
    duration:fmtDur(s.durationSec), language:s.language, segments:s.segments, flagged:s.flagged, avgSnr:s.avgSnr,
    transcriptConf:s.transcriptConf, speakerCount:s.speakerCount, status:s.status, silenceInstances:Math.round(s.durationSec/420),
    languages: langBreakdown(langs, rand) };
  // materialise a capped set of segments (perf §10) but keep the flagged count faithful within the sample
  const sample=Math.min(s.segments, 60); const flaggedSample=Math.round(s.flagged/s.segments*sample);
  let t=0; for(let i=0;i<sample;i++){ const dur=6+Math.floor(rand()*16); const lang=langs.length>1?(rand()<0.55?langs[0]:langs[1]):langs[0];
    const isLow = i<flaggedSample; const conf = isLow ? 40+Math.floor(rand()*19) : 70+Math.floor(rand()*29);
    const clean=(AUDIO_TRANSCRIPTS[lang]||AUDIO_TRANSCRIPTS.en)[Math.floor(rand()*(AUDIO_TRANSCRIPTS[lang]||AUDIO_TRANSCRIPTS.en).length)];
    audioSegments.push({ id:'seg'+(++SEG_UID), audioId:file.id, tenantId:file.tenantId, index:i, tsStart:t, tsEnd:t+dur, durationSec:dur,
      script:lang, transcript: conf<70? clean.replace(/\S+/g,(w,idx)=> Math.random()<(70-conf)/90?'[unclear]':w) : clean, cleanText:clean,
      correctedText:null, confidence:conf, status: conf<60?'pending':'ok', flag:null, correctedBy:null }); t+=dur; }
  audioFiles.push(file); return file;
}
function buildVideoFile(s){
  const rand=mkRand(s.seed); const langs=langList(s.language);
  const file={ id:s.id, tenantId:s.tenantId, projectId:s.projectId, name:s.name, durationSec:s.durationSec, duration:fmtDur(s.durationSec),
    resolution:s.resolution, language:s.language, frames:s.frames, captioned:s.captioned, flagged:s.flagged, visualScore:s.visualScore,
    audioQuality:71, transcriptConf:61, blurryRemoved:Math.round(s.frames*0.15), darkRemoved:Math.round(s.frames*0.05), sceneChanges:Math.round(s.durationSec/60),
    contentType:'Documentary / Field recording', status:s.status };
  const sample=Math.min(s.frames, 48); const flaggedSample=Math.round(s.flagged/s.frames*sample);
  let t=0; for(let i=0;i<sample;i++){ t+= 8+Math.floor(rand()*90);
    const isLow=i<flaggedSample; const vscore=isLow?40+Math.floor(rand()*19):70+Math.floor(rand()*29);
    videoFrames.push({ id:'frm'+(++FRM_UID), videoId:file.id, tenantId:file.tenantId, index:i, timestamp:t, ts:fmtDur(t),
      caption:FRAME_CAPTIONS[Math.floor(rand()*FRAME_CAPTIONS.length)], onScreenText:ONSCREEN_TEXT[Math.floor(rand()*ONSCREEN_TEXT.length)],
      correctedCaption:null, visualScore:vscore, captionConf:vscore, blurScore:isLow?30+Math.floor(rand()*20):60+Math.floor(rand()*30),
      darkness:40+Math.floor(rand()*40), isDuplicate:false, hasFaces:rand()<0.3, consentFlag:false,
      status: vscore<60?'pending':'ok', flag:null, qaPairs:[], seed:s.seed }); }
  videoFiles.push(file); return file;
}
function fmtDur(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h? (h+'h '+m+'m') : (m+'m'); }
function langBreakdown(langs, rand){ if(langs.length===1) return [{code:langs[0],pct:100}];
  const a=55+Math.floor(rand()*15); return [{code:langs[0],pct:a},{code:langs[1],pct:100-a}]; }

function applyMonitorPreset(preset){

  c.signals.forEach(s=>{ if(s.unavailable){ s.weight=0; return; } s.weight = w[s.key]||0; s.enabled = (w[s.key]||0)>0 || s.enabled; });
  log.event('monitor:preset',{preset}); showToast('Applied preset: '+preset,'ok');
  renderView();

  const seeds=getCorpusSeeds(); const n=seeds.length; if(!n){ showToast('No seeds to approve','info'); return; }
  const cs=getColdStart();
  if(cs){ cs.corpusEmbeddings += n; cs.signals.drift.progress += n;
    if(cs.signals.drift.progress>=cs.signals.drift.target){ cs.signals.drift.active=true; cs.signals.drift.reason='active'; } }
  corpusSeeds=corpusSeeds.filter(s=>s.tenantId!==currentTenant.id);
  notifications=notifications.filter(nn=>nn.id!=='nseed');
  log.event('seeds:approve',{count:n});
  pushActivity('approved '+n+' corpus seed embeddings');
  showToast(n+' embeddings added to corpus — semantic drift '+(cs&&cs.signals.drift.active?'activated':'coverage updated'),'ok');
  appState.reviewTab='datasets'; renderView();
}

// Score breakdown with "Checked against" source line per signal (spec §30, note 60)
function inferenceBreakdown(x){
  const hallScore = x.flags.includes('Hallucination')?28:80+Math.round((x.factuality-70)/3);
  const drift = 60+Math.round((x.score-60)/4);
  const dot=v=>v==null?'':(v>80?'✅':v>=60?'🟡':'🔴');
  const rows=[
    ['Factuality', x.factuality, x.contextChunks+' context chunks at inference time', x.factuality<50?'2 claims contradicted, 1 neutral':'Claims consistent with context'],
    ['Hallucination', Math.max(0,Math.min(100,hallScore)), 'Context chunks + domain entity list', x.flags.includes('Hallucination')?'"₹45 crore" absent from all sources':'No fabricated entities detected'],
    ['Policy', x.policy, '12 configured rules', x.policy>85?'All passed except tone threshold':'Policy check flagged'],
    ['Confidence', null, 'Logprobs not available from endpoint', 'Cannot score — signal disabled'],
    ['Semantic Drift', Math.max(0,Math.min(100,drift)), (getCoverage()?fmtNum(getCoverage().corpusSize):'4,203')+' approved responses in corpus', 'Moderate distance from cluster centre'],
    ['User Feedback', null, 'No feedback received yet', ''],
  ];
  let body=rows.map(r=>{
    const scoreCell = r[1]==null ? '—   ⬜' : (r[1]+'% '+dot(r[1]));
    return '<tr><td style="vertical-align:top">'+escapeHtml(r[0])+'</td><td class="mono" style="vertical-align:top;white-space:nowrap">'+scoreCell+'</td>'
      +'<td class="muted" style="font-size:11px;line-height:1.5">'+escapeHtml(r[2])+(r[3]?'<div>'+escapeHtml(r[3])+'</div>':'')+'</td></tr>'; }).join('');
  body+='<tr style="font-weight:600;background:var(--bg-hover)"><td>Weighted Overall</td><td class="mono">'+x.score+'% '+dot(x.score)+'</td><td></td></tr>';
  return '<div class="card" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th>Signal</th><th>Score</th><th>Checked against</th></tr></thead><tbody>'+body+'</tbody></table></div>';
}

let PREF_UID=0;
function initPrefPairs(){
  prefPairs=[];
  const perTenant={ tenant_pravartak:'p1', tenant_legalai:'p4', tenant_healthbot:'p7' };
  tenants.forEach(t=>{ const rand=mkRand(t.id.length*331+3); const pid=perTenant[t.id];
    for(let i=0;i<150;i++){ const base=PREF_SEED[i%PREF_SEED.length]; const r=rand();
      let chosen=null, status='pending';
      // pre-complete a portion so agreement/exports have data
      if(i<40){ status='done'; chosen = r<0.6?'B':r<0.85?'A':(r<0.93?'tie':'both_bad'); }
      const kind = r<0.60?'clear':r<0.85?'close':'bad';
      prefPairs.push({ id:'pref_'+(++PREF_UID), tenantId:t.id, projectId:pid, datasetName:'RLHF Dataset v1',
        instruction:base.instruction, ctx:base.ctx, respA:base.a, respB:base.b, confA:base.confA, confB:base.confB,
        chosen, reasoning: chosen==='B'?'B is clearer and avoids unnecessary legal jargon':'', kind, status,
        dims:{clarity:null,accuracy:null,completeness:null,tone:null},
        votes: kind==='clear'?['B','B','B']:kind==='close'?['B','A','B']:['both_bad','A','both_bad'] }); } });
  log.info('[boot] preference pairs ready — '+prefPairs.length);
}
function prefQueue(){ return getPrefPairs().filter(p=>p.status==='pending'); }
function prefAgreement(votes){ const counts={}; votes.forEach(v=>counts[v]=(counts[v]||0)+1); const max=Math.max(...Object.values(counts));
  if(max===votes.length) return {level:'high',label:'✅ High confidence — all agree'};
  if(max>=Math.ceil(votes.length*2/3)) return {level:'mid',label:'⚠️ Review recommended — '+max+'/'+votes.length+' agree'};
  return {level:'low',label:'🔴 Ambiguous — escalate to architect'}; }

// Tiny syntax highlighter for the snippets (Python/YAML) — escapes first, then classes.
function highlightCode(text){
  const lines=text.split('\n').map(line=>{
    const c=line.indexOf('#');
    if(c>=0){ const before=line.slice(0,c), comment=line.slice(c); return hlTokens(before)+'<span class="cd-com">'+escapeHtml(comment)+'</span>'; }
    return hlTokens(line);
  });
  return lines.join('\n');
}
function hlTokens(s){
  let out=escapeHtml(s);
  out=out.replace(/&quot;[^&]*?&quot;/g, m=>'<span class="cd-str">'+m+'</span>');
  out=out.replace(/\b(from|import|def|return|None|True|False|version|services|image|ports|environment)\b/g, '<span class="cd-kw">$1</span>');
  out=out.replace(/\b(monitor|generate|init|feedback|notify_deployment)\b/g, '<span class="cd-fn">$1</span>');
  return out;
}

function startAgentAnimation(){
  clearScreenTimers();
  registerTimer(setInterval(()=>{
    if(currentView!=='agents'){ clearScreenTimers(); return; }
    agentSynthTick++; const t=AGENT_SYNTH[agentSynthTick%AGENT_SYNTH.length];
    agentLog.unshift({ id:'al_syn'+agentSynthTick, tenantId:currentTenant.id, ...t, time:'now' });
    // cap at 20 visible for this tenant (note 83)
    const mine=agentLog.filter(x=>x.tenantId===currentTenant.id);
    if(mine.length>20){ const drop=mine[mine.length-1]; const i=agentLog.indexOf(drop); if(i>=0) agentLog.splice(i,1); }
    const box=el('agent-log'); if(box) box.innerHTML=logEntriesHtml(getAgentLog());
  }, 45000));

    let changed=false; agentLog.forEach(e=>{ if(e.undoMin!=null){ e.undoMin--; changed=true; if(e.undoMin<=0) e.undoMin=null; } });
    if(changed){ const box=el('agent-log'); if(box) box.innerHTML=logEntriesHtml(getAgentLog()); }
  }, 60000));
  log.event('agents:animate',{});

function doLogin(email, pass){
  const u=users.find(x=>x.email.toLowerCase()===email.toLowerCase());
  const err=el('login-err');
  if(!u || pass!==PASSWORD){ if(err){ err.classList.remove('hidden'); err.innerHTML=ICON.warn+'Invalid email or password. Try a demo account below.'; } log.warn('[auth] failed login', email); return; }
  currentUser=u; impersonating=false; superReturn=null;
  currentTenant = u.tenantId ? byId(tenants,u.tenantId) : null;
  // Land each persona on its natural first destination (UX redesign phase 1).
  currentView = (u.role==='SuperAdmin') ? 'tenants'
    : (u.role==='Annotator' || u.role==='Reviewer') ? 'review'
    : 'dashboard';
  appState.reviewTab = 'datasets';
  if(currentTenant){ const p=getProjects()[0]; appState.projectId=p?p.id:null; const r=p?projectReleases(p.id)[0]:null; appState.releaseId=r?r.id:null; }
  document.body.classList.remove('impersonating');
  log.event('login',{user:u.email, role:u.role, tenant:currentTenant?currentTenant.id:'platform'});
  renderShell();
  showToast('Signed in as '+u.name+' · '+ROLE_LABEL[u.role],'ok');
}
function doLogout(){ log.event('logout',{user:currentUser&&currentUser.email}); currentUser=null; currentTenant=null; impersonating=false; const b=el('imp-banner'); if(b) b.remove(); closeModal(); closeAllDropdowns(); renderLogin(); }

function enterImpersonation(tid){
  const t=byId(tenants,tid); if(!t) return;
  superReturn={ user:currentUser, view:currentView };
  const admin=users.find(u=>u.tenantId===tid && u.role==='Admin');
  impersonating=true; currentTenant=t; currentUser=admin||currentUser; currentView='dashboard';
  const p=getProjects()[0]; appState.projectId=p?p.id:null; const r=p?projectReleases(p.id)[0]:null; appState.releaseId=r?r.id:null;
  document.body.classList.add('impersonating');
  renderImpersonationBanner();
  log.event('impersonate:enter',{tenant:tid});
  renderShell();
}
function exitImpersonation(){
  impersonating=false; currentUser=superReturn?superReturn.user:users.find(u=>u.role==='SuperAdmin');
  currentTenant=null; currentView=superReturn?superReturn.view:'tenants'; superReturn=null;
  document.body.classList.remove('impersonating');
  const b=el('imp-banner'); if(b) b.remove();
  log.event('impersonate:exit',{});
  renderShell();
}

/* Command palette */
function openPalette(){ appState.paletteOpen=true; appState.paletteQuery=''; appState.paletteSel=0; renderPalette(); }
function closePalette(){ appState.paletteOpen=false; el('overlays').innerHTML=''; }
function paletteItems(q){ q=(q||'').toLowerCase(); const items=[];
  const add=(group,icon,label,action,data)=>items.push({group,icon,label,action,data});
  getProjects().forEach(p=>add('Projects','folder',p.name,'open-project',{id:p.id}));
  getDatasets().forEach(d=>add('Datasets','database',d.name,'goto-dataset',{id:d.id}));
  getEvalRuns().forEach(e=>add('Eval Runs','bolt',e.checkpointB+' — '+e.runAt,'load-eval',{id:e.id}));
  getExperiments().forEach(x=>add('Experiments','beaker',x.name,'open-experiment',{id:x.id}));
  getDocuments().forEach(dd=>{ add('Documents','doc',dd.name,'open-doc',{id:dd.id});
    add('Documents','scissors','Configure chunking for '+truncate(dd.name,28),'configure-chunking',{id:dd.id});
    add('Documents','sparkles','Generate pairs from '+truncate(dd.name,28),'configure-synthesis',{id:dd.id}); });
  let rc=0; if(q) getDatasets().forEach(d=>d.rows.forEach(r=>{ if(rc<40 && (r.instruction||'').toLowerCase().includes(q)){ add('Rows','pencil',truncate(r.instruction,50),'open-row',{id:r.id}); rc++; } }));
  getBulkJobs().forEach(j=>add('Bulk Jobs','grid',j.name,'bulk-open',{id:j.id}));
  getAudioFiles().forEach(f=>add('Audio','bolt',f.name,'open-audio',{id:f.id}));
  getVideoFiles().forEach(f=>add('Video','image',f.name,'open-video',{id:f.id}));
  [['Upload dataset','upload-dataset',null],['Upload document','upload-document',null],['Correct OCR regions','goto-ocr',null],['Start bulk ingestion job','bulk-start',null],['View bulk job status','bulk-status',null],['View deduplication report','bulk-status',null],['View annotation project','goto-annotation',null],['Run eval','nav','eval'],['New project','new-project',null],['New experiment','new-experiment',null],['About platform / Guide','nav','guide'],['Open FAQ','nav','guide'],['Upload audio','upload-audio',null],['Upload video','upload-video',null],['Correct audio segments','goto-audio-corr',null],['Review video frames','goto-video-corr',null],['Open inference monitor','nav','monitor'],['View agents','nav','agents'],['Configure monitor','configure-monitor',null],['View integration guide','view-integration-guide',null],['Rank preferences (RLHF)','goto-pref',null],['Import from annotation tool','import-connector',null]].forEach(a=>add('Actions','plus',a[0],a[1],a[2]?{view:a[2]}:{}));
  const filtered = q ? items.filter(i=>i.label.toLowerCase().includes(q)||i.group.toLowerCase().includes(q)) : items.slice(0,12);
  return filtered.slice(0,40);
}
function renderPalette(){ const items=paletteItems(appState.paletteQuery);
  if(appState.paletteSel>=items.length) appState.paletteSel=Math.max(0,items.length-1);
  let groups={}; items.forEach((it,i)=>{ (groups[it.group]=groups[it.group]||[]).push({it,i}); });
  let res=''; Object.entries(groups).forEach(([g,arr])=>{ res+='<div class="palette-group">'+g+'</div>';
    arr.forEach(({it,i})=>res+='<div class="palette-item '+(i===appState.paletteSel?'is-active':'')+'" data-action="palette-run" data-idx="'+i+'"><span class="pi-ic">'+ICON[it.icon]+'</span><span>'+escapeHtml(it.label)+'</span><span class="palette-hint">'+it.group+'</span></div>'); });
  if(!items.length) res='<div class="muted" style="padding:20px;text-align:center">No results</div>';
  el('overlays').innerHTML='<div class="palette-scrim" data-action="close-palette"><div class="palette" data-stop="1"><input class="palette-input" id="palette-input" placeholder="Search projects, datasets, rows, runs…" value="'+escapeAttr(appState.paletteQuery)+'"><div class="palette-results">'+res+'</div></div></div>';
  const inp=el('palette-input'); inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length);
  inp.oninput=()=>{ appState.paletteQuery=inp.value; appState.paletteSel=0; renderPalette(); };
  window._paletteItems=items;
}
function runPaletteItem(i){ const items=window._paletteItems||[]; const it=items[i]; if(!it) return; closePalette(); dispatch(it.action, it.data||{}); }

function pushNotif(text, icon){ notifications.unshift({id:'n'+Date.now(), tenantId:currentTenant?currentTenant.id:null, text, time:'just now', read:false, icon:icon||'info'}); }
function pushActivity(text){ activity.unshift({id:'a'+Date.now(), tenantId:currentTenant?currentTenant.id:null, who:currentUser.name, text, time:'just now'}); }

/* ---- Review actions ---- */
function reviewRow(rowId, action, fromQueue){
  const found=findRow(rowId); if(!found) return; const {row,dataset}=found;
  if(!assertTenant(dataset)) return;
  if(!can('Annotation')){ showToast('You lack annotation permission','error'); return; }
  row.reviewStatus = action==='approve'?'approved':'rejected';
  row.reviewedBy = currentUser.name;
  finaliseDataset(dataset);
  log.event('row:'+action,{row:rowId, dataset:dataset.id});
  pushActivity((action==='approve'?'approved':'rejected')+' row '+rowId+' in '+dataset.name);
  showToast('Row '+rowId+' '+(action==='approve'?'approved':'rejected'),'ok');
  if(fromQueue){ renderView(); } else { closePanel(); renderView(); }
}
function editRowModal(rowId, fromQueue){
  const found=findRow(rowId); if(!found) return; const {row}=found;
  openModal('<div class="modal-head"><strong>Edit output · '+escapeHtml(rowId)+'</strong><button class="icon-btn" data-action="close-modal">'+ICON.x+'</button></div>'
    +'<div class="modal-body"><label class="field-label">Output</label><textarea class="input" id="edit-output">'+escapeHtml(row.output)+'</textarea>'
    +'<div class="row-between mt8"><span class="muted" id="edit-count" style="font-size:12px">'+row.output.length+' chars</span></div></div>'
    +'<div class="modal-foot"><button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-primary" id="save-edit">'+ICON.check+'Save Edit</button></div>');
  const ta=el('edit-output'); ta.oninput=()=>{ el('edit-count').textContent=ta.value.length+' chars'; };
  el('save-edit').onclick=()=>{ saveRowEdit(rowId, ta.value, fromQueue); };
}
function saveRowEdit(rowId, newOutput, fromQueue){
  const found=findRow(rowId); if(!found) return; const {row,dataset}=found;
  if(row.originalOutput==null) row.originalOutput=row.output;
  row.output=newOutput; row.reviewStatus='edited'; row.reviewedBy=currentUser.name;
  row.flags=deriveFlags(row, dataset.rows.filter(r=>r!==row)); row.qualityScore=scoreRow(row);
  finaliseDataset(dataset); closeModal();
  log.event('row:edit',{row:rowId}); pushActivity('edited row '+rowId+' in '+dataset.name);
  showToast('Edit saved','ok');
  if(appState.panel&&appState.panel.id===rowId) panelRow(rowId);
  renderView();
}

/* ---- Eval run flow ---- */
function runEvalFlow(relId){
  if(!can('Eval')){ showToast('You lack eval permission','error'); return; }
  const rel = byId(getReleases(), relId) || activeRelease(); if(!rel){ showToast('No release selected','error'); return; }

function handleUpload(file){

  const steps=['Parsing '+escapeHtml(file.name)+'…','Detecting language…','Scoring rows…','Flagging issues…','Done'];
  let i=0;
  const reader=new FileReader();
  reader.onerror=()=>{ log.error('[upload] read failed'); showToast('Could not read file','error'); };
  reader.onload=()=>{ log.info('[upload] read '+file.name+' ('+(reader.result||'').length+' bytes)'); runCuration(); };
  try{ reader.readAsText(file.slice(0, 200000)); }catch(err){ log.error('[upload] slice failed',err); runCuration(); }

    const tick=()=>{ if(!el('up-progress')) return;

function handleDocUpload(files){
  if(!files.length) return;
  const allowed=['pdf','docx','doc','ppt','pptx','jpg','jpeg','png','tiff','tif'];
  files=files.slice(0,20).filter(f=>{ const ext=(f.name.split('.').pop()||'').toLowerCase(); if(!allowed.includes(ext)){ log.warn('[doc] rejected', f.name); showToast('Skipped unsupported file: '+f.name,'info'); return false; } return true; });
  if(!files.length) return;
  const prog=el('doc-progress'); prog.classList.remove('hidden');
  // process sequentially with animated pipeline steps
  let fi=0;
  const nextFile=()=>{
    if(fi>=files.length){ closeModal(); setView('documents'); appState.docView='list'; showToast(files.length+' document'+(files.length>1?'s':'')+' ingested','ok'); return; }
    const f=files[fi]; const ext=(f.name.split('.').pop()||'').toLowerCase();
    const isImage=['jpg','jpeg','png','tiff','tif'].includes(ext);
    // heuristic: scanned if name hints or is image; digital otherwise
    const scanned = isImage || /scan|audit|judgment|heritage|clinical|hindi|tamil/i.test(f.name);
    const steps = scanned
      ? ['Pre-processing (deskew, denoise)…','Detecting layout (columns, tables, headings)…','Detecting script per region…','Running OCR…','Scoring confidence per region…','Post-processing (Unicode normalise, ligature fix)…','Done']
      : ['Extracting text…','Detecting structure…','Chunking…','Done'];
    let si=0;
    const tick=()=>{ if(!el('doc-progress')) return;
      const done=si>=steps.length-1;
      prog.innerHTML='<div class="mono muted" style="font-size:11px;margin-bottom:6px">'+escapeHtml(f.name)+' ('+(fi+1)+'/'+files.length+')</div>'
        +'<div class="flex gap8">'+(done?ICON.check:'<div class="pill pill-blue">'+(si+1)+'/'+steps.length+'</div>')+'<span>'+escapeHtml(steps[si])+'</span></div>'
        +'<div class="meter mt8"><div class="meter-fill" style="width:'+Math.round((si+1)/steps.length*100)+'%;background:var(--gradient-brand)"></div></div>';
      si++; if(si<steps.length){ setTimeout(tick, 480); } else { finalizeDocUpload(f, ext, scanned); fi++; setTimeout(nextFile, 250); } };
    tick();
  };
  nextFile();
}
function finalizeDocUpload(f, ext, scanned){
